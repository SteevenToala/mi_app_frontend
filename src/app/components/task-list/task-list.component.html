<section class="task-card" aria-labelledby="task-list-heading">
  <header class="task-header">
    <div>
      <p class="section-kicker">Manejo de estados</p>
      <h2 id="task-list-heading">Lista de tareas</h2>
    </div>

    <div class="task-metrics" aria-label="Resumen de tareas">
      <span>{{ pendingCount }} pendientes</span>
      <span>{{ completedCount }} completadas</span>
    </div>
  </header>

  <form class="task-form" (ngSubmit)="addTask()">
    <label for="new-task">Agregar una tarea</label>
    <div class="task-form-row">
      <input
        id="new-task"
        name="newTask"
        [(ngModel)]="newTask"
        type="text"
        placeholder="Escribe una nueva tarea"
        autocomplete="off"
      />
      <button type="submit">Agregar</button>
    </div>
  </form>

  <ul class="task-list">
    <li *ngFor="let task of tasks; trackBy: trackById" class="task-item">
      <button
        type="button"
        class="task-status"
        [class.is-completed]="task.completed"
        (click)="toggleTask(task.id)"
        [attr.aria-pressed]="task.completed"
      >
        {{ task.completed ? 'Completada' : 'Pendiente' }}
      </button>

      <p [class.is-done]="task.completed">{{ task.title }}</p>

      <button type="button" class="task-delete" (click)="deleteTask(task.id)">
        Eliminar
      </button>
    </li>
  </ul>
</section>
