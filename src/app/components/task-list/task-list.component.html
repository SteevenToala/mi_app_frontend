<section class="task-card" aria-labelledby="task-list-heading">
  <header class="task-header">
    <div>
      <p class="section-kicker">Manejo de estados</p>
      <h2 id="task-list-heading">Lista de tareas</h2>
    </div>

    <div class="task-header-actions">
      <div class="task-metrics" aria-label="Resumen de tareas">
        <span>{{ pendingCount }} pendientes</span>
        <span>{{ completedCount }} completadas</span>
      </div>

      <button type="button" class="task-add-trigger" (click)="openTaskModal()">
        + Agregar tarea
      </button>
    </div>
  </header>

  <ul class="task-list">
    <li *ngFor="let task of tasks; trackBy: trackById" class="task-item">
      <button
        type="button"
        class="task-status"
        [class.is-completed]="task.completed"
        (click)="toggleTask(task.id)"
        [attr.aria-pressed]="task.completed"
      >
        {{ task.completed ? 'Completada' : 'Pendiente' }}
      </button>

      <p [class.is-done]="task.completed">{{ task.title }}</p>

      <button type="button" class="task-delete" (click)="deleteTask(task.id)">
        Eliminar
      </button>
    </li>
  </ul>

  <div
    class="task-modal"
    *ngIf="isTaskModalOpen"
    role="dialog"
    aria-modal="true"
    aria-labelledby="task-modal-title"
  >
    <div class="task-modal-backdrop" (click)="cancelTaskModal()" aria-hidden="true"></div>

    <article class="task-modal-panel">
      <header class="task-modal-header">
        <h3 id="task-modal-title">Agregar tarea</h3>
        <button type="button" class="task-modal-close" (click)="cancelTaskModal()">Cerrar</button>
      </header>

      <form class="task-form" (ngSubmit)="addTask()">
        <label for="new-task-title">Titulo de la tarea</label>
        <div class="task-form-row">
          <input
            id="new-task-title"
            name="newTaskTitle"
            [(ngModel)]="taskForm.title"
            type="text"
            placeholder="Escribe una nueva tarea"
            autocomplete="off"
            required
          />
        </div>

        <div class="task-form-actions">
          <button type="submit">Guardar tarea</button>
          <button type="button" class="ghost" (click)="cancelTaskModal()">Cancelar</button>
        </div>
      </form>
    </article>
  </div>
</section>
