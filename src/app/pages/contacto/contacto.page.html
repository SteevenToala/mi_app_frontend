<app-header></app-header>

<ion-content class="page-content" [fullscreen]="false">
  <main class="page-layout">
    <section class="contact-grid" aria-labelledby="team-heading">
      <div class="contact-panel">
        <div class="section-heading">
          <p class="hero-kicker">Equipo</p>
          <h2 id="team-heading">Personas de contacto</h2>
        </div>

        <div class="contact-list">
          <article class="contact-card" *ngFor="let contact of contacts">
            <p class="contact-role">{{ contact.role }}</p>
            <h3>{{ contact.name }}</h3>
            <dl>
              <div>
                <dt>Email</dt>
                <dd><a [href]="'mailto:' + contact.email">{{ contact.email }}</a></dd>
              </div>
              <div>
                <dt>Teléfono</dt>
                <dd><a [href]="'tel:' + contact.phone">{{ contact.phone }}</a></dd>
              </div>
              <div>
                <dt>Horario</dt>
                <dd>{{ contact.schedule }}</dd>
              </div>
            </dl>
          </article>
        </div>
      </div>
    </section>
  </main>

  <app-footer></app-footer>
</ion-content>
